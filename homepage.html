<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/homepage.css">
    <title>Nyeri homepage news centre</title>
    <!-- Keep page-specific overrides local -->
    <style>
        .sidebar{
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 25px;
            margin-top: 25px;
            
        }
        .profile-infor--images{
            object-fit: cover;
            width: 50px;
            height: 50px;
            border-radius: 25px;

            
        }
        .profile-infor{
            
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;  
        }
        .name--profile{
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            margin: 0;
        }
        .username--profile{
            font-family: monospace;
            font-size: 15px;
            color: gray;
            margin: 0;
        }
        .feeds-div{
            width: 300px;
            height: 50px;
            background-color: rgb(212, 204, 204);
            margin-top: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding-left: 15px;
        }
        .feeds-div.feeds-div:hover{
            background-color: rgb(116, 99, 99);
        }
        fa-solid fa-house, .fa-solid fa-bullhorn, .fa-solid fa-triangle-exclamation, .fas fa-calendar, .fa-brands fa-instagram, .fa-solid fa-arrow-trend-up, .fa-solid fa-briefcase, .fa-solid fa-circle-info, .fa-solid fa-address-book{
            color: white;
            background-color: thistle;
        }
     
    </style>
</head>
<body>

    <section class="sidebar">
        <div class="profile-infor">

            <img class="profile-infor--images" src="photos/nyeriCommun.png" alt="">
            <img class="profile-infor--images" src="photos/placeholder-profile.webp" alt="">

            <p class="name--profile">John Doe</p>
            <p class="username--profile">@johndoe</p>
        </div>

    <div class="feeds-div"><h3><i class="fa-solid fa-house"></i>Home</h3></div>
    <div class="feeds-div"><h3><i class="fa-solid fa-bullhorn"></i>Announcements</h3></div>
      <div class="feeds-div"><h3><i class="fa-solid fa-triangle-exclamation"></i>Alerts</h3></div>
    <div class="feeds-div"><h3><i class="fas fa-calendar"></i>Events</h3></div>
    <div class="feeds-div"><h3><i class="fa-brands fa-instagram"></i>Stories</h3></div>
    <div class="feeds-div"><h3><i class="fa-solid fa-arrow-trend-up"></i>Market Trends</h3></div>
    <div class="feeds-div"><h3><i class="fa-solid fa-briefcase"></i>Jobs</h3></div>
    <div class="feeds-div"><h3><i class="fa-solid fa-circle-info"></i>About</h3></div>
    <div class="feeds-div"><h3><i class="fa-solid fa-address-book"></i>Contacts</h3></div>
  

    </section>
    
</body>
</html>
